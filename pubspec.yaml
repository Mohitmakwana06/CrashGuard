name: crash_guard
description: "Accident Detection System — detects crashes via ESP32/Firebase, alerts user, sends emergency SMS with GPS location."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_database: ^11.3.5
  firebase_messaging: ^15.2.5

  # Location
  geolocator: ^13.0.2

  # Vibration
  vibration: ^2.0.0

  # Audio (alarm sound)
  audioplayers: ^6.1.0

  # Notifications (full-screen intent)
  flutter_local_notifications: ^18.0.1

  # Background service
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.2.7

  # HTTP for Twilio API
  http: ^1.3.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Permissions
  permission_handler: ^11.4.0

  # Typography
  google_fonts: ^6.2.1

  # UUID generation
  uuid: ^4.5.1

  # Connectivity check
  connectivity_plus: ^6.1.4

  # BLE scanning & communication
  flutter_blue_plus: ^1.35.2

  # Firebase Authentication
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.4.5

  # Shared preferences (persist auth & device info locally)
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/
